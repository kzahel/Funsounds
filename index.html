<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Sounds for Toddlers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #start-screen {
            text-align: center;
            color: white;
        }

        #start-screen h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #start-screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        #start-btn {
            font-size: 2rem;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        #play-area {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .emoji-display {
            position: absolute;
            font-size: 8rem;
            pointer-events: none;
            animation: pop-in 0.3s ease-out;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            z-index: 10;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .emoji-display.fading {
            transition: opacity 0.5s ease-out;
            opacity: 0;
        }

        /* Mobile touch grid */
        #touch-grid {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 100;
        }

        .touch-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #touch-grid.grid-large .touch-btn {
            font-size: 3.5rem;
            border-radius: 12px;
        }

        #touch-grid.grid-large .color-swatch {
            width: 50%;
        }

        .touch-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }

        .touch-btn.playing {
            animation: pulse 0.3s ease-out;
        }

        .touch-btn .emoji {
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }

        .touch-btn.fading .emoji {
            opacity: 0;
            transform: scale(1.5);
        }

        .touch-btn.charging {
            animation: charge 0.15s ease-out forwards;
        }

        .touch-btn.charging .emoji {
            animation: emoji-charge 0.15s ease-out forwards;
        }

        @keyframes charge {
            0% {
                background: rgba(255,255,255,0.1);
            }
            100% {
                background: rgba(255,255,255,0.35);
            }
        }

        @keyframes emoji-charge {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            100% {
                transform: scale(1.15);
                filter: brightness(1.3);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            #start-screen h1 {
                font-size: 2rem;
            }
            #start-btn, #quiz-btn {
                font-size: 1.5rem;
                padding: 0.8rem 2rem;
            }
            #mode-selector {
                max-width: 280px;
            }
            .mode-btn .mode-icon {
                font-size: 1.8rem;
            }
            .mode-btn .mode-label {
                font-size: 0.85rem;
            }
            .touch-btn {
                font-size: 5rem;
            }
        }

        /* Mode selector */
        #mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 1.5rem auto;
            max-width: 340px;
        }

        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 0.5rem;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-btn .mode-icon {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .mode-btn .mode-label {
            font-size: 1rem;
            font-weight: 600;
        }

        .mode-btn.selected {
            border-color: #ffd93d;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,217,61,0.3);
        }

        .mode-btn:active {
            transform: scale(0.95);
        }

        /* Difficulty slider */
        #difficulty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem auto;
            color: white;
            font-size: 1.1rem;
        }

        #difficulty-control label {
            font-weight: 600;
        }

        #difficulty-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
            outline: none;
        }

        #difficulty-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ffd93d;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        #difficulty-label {
            min-width: 60px;
            font-weight: 600;
        }

        #quiz-btn {
            font-size: 2rem;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            background: #ff6b9d;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        #quiz-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #quiz-btn:active {
            transform: scale(0.98);
        }

        #quiz-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            flex-direction: column;
        }

        #quiz-prompt {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 15vh;
            min-height: 60px;
        }

        #quiz-speaker {
            font-size: 4rem;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #quiz-speaker:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.3);
        }

        #quiz-speaker.speaking {
            animation: speaker-pulse 0.6s ease-in-out infinite;
        }

        @keyframes speaker-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #quiz-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            flex: 1;
        }

        .quiz-btn {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .quiz-btn:active {
            transform: scale(0.95);
        }

        .quiz-btn.correct {
            animation: correct-flash 0.5s ease-out;
            background: rgba(0, 255, 100, 0.4);
        }

        @keyframes correct-flash {
            0% { background: rgba(0, 255, 100, 0.1); transform: scale(1); }
            50% { background: rgba(0, 255, 100, 0.5); transform: scale(1.08); }
            100% { background: rgba(0, 255, 100, 0.4); transform: scale(1); }
        }

        .quiz-btn.fade-in .emoji {
            animation: quiz-fade-in 0.4s ease-out;
        }

        @keyframes quiz-fade-in {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Text choices (letters, numbers) */
        .text-choice {
            color: white;
            font-weight: 700;
        }

        /* Color swatches */
        .color-swatch {
            width: 60%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            animation: quiz-fade-in 0.4s ease-out;
        }

        /* Star bar */
        #star-bar {
            display: flex;
            gap: 6px;
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        .star-slot {
            font-size: 1.8rem;
            opacity: 0.25;
            transition: opacity 0.3s, transform 0.3s;
        }

        .star-slot.earned {
            opacity: 1;
            animation: star-pop 0.4s ease-out;
        }

        @keyframes star-pop {
            0% { transform: scale(0.3) rotate(-30deg); }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Finale overlay */
        #finale-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2000;
            pointer-events: none;
        }

        #finale-overlay.active {
            display: block;
        }

        .finale-star {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
        }

        .finale-star.roaming {
            animation: star-roam linear infinite;
        }

        @keyframes star-roam {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(30vw, -20vh) rotate(180deg) scale(1.2); }
            50% { transform: translate(-10vw, 15vh) rotate(360deg) scale(0.9); }
            75% { transform: translate(20vw, 10vh) rotate(540deg) scale(1.1); }
            100% { transform: translate(0, 0) rotate(720deg) scale(1); }
        }

        .finale-star.grow {
            animation: star-grow 1.5s ease-in-out forwards;
        }

        @keyframes star-grow {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -50%) scale(6) rotate(180deg); }
            100% { transform: translate(-50%, -50%) scale(8) rotate(360deg); opacity: 0; }
        }

        /* Wrong answer X */
        .wrong-x {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 5rem;
            color: rgba(255, 80, 80, 0.7);
            pointer-events: none;
            animation: wrong-fade 0.6s ease-out forwards;
        }

        @keyframes wrong-fade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Confetti */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            #quiz-speaker {
                font-size: 3rem;
                width: 64px;
                height: 64px;
            }
            .quiz-btn {
                font-size: 5rem;
            }
        }

        #instruction-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>Fun Sounds!</h1>
        <p>Pick a game!</p>
        <button id="start-btn">Free Play</button>

        <div id="mode-selector">
            <button class="mode-btn selected" data-mode="objects">
                <span class="mode-icon">🐶</span>
                <span class="mode-label">Objects</span>
            </button>
            <button class="mode-btn" data-mode="alphabet">
                <span class="mode-icon">🔤</span>
                <span class="mode-label">Letters</span>
            </button>
            <button class="mode-btn" data-mode="colors">
                <span class="mode-icon">🌈</span>
                <span class="mode-label">Colors</span>
            </button>
            <button class="mode-btn" data-mode="numbers">
                <span class="mode-icon">🔢</span>
                <span class="mode-label">Numbers</span>
            </button>
        </div>

        <div id="difficulty-control">
            <label for="difficulty-slider">Difficulty</label>
            <input type="range" id="difficulty-slider" min="1" max="3" value="2" step="1">
            <span id="difficulty-label">Normal</span>
        </div>

        <button id="quiz-btn">Start Quiz</button>
    </div>

    <div id="play-area">
        <div id="instruction-hint">Hold Escape to exit</div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-prompt">
            <div id="star-bar"></div>
            <button id="quiz-speaker">🔊</button>
        </div>
        <div id="quiz-grid"></div>
        <div id="confetti-container"></div>
        <div id="finale-overlay"></div>
    </div>

    <div id="touch-grid"></div>

    <script src="app.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
