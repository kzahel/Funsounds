<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Sounds for Toddlers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        #start-screen {
            text-align: center;
            color: white;
            padding: 1rem 0 2rem;
        }

        #start-screen h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #start-screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .game-card {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 1.5rem 1.2rem;
            margin: 1rem auto;
            max-width: 400px;
        }

        .game-card h2 {
            color: white;
            font-size: 1.3rem;
            margin: 0 0 0.8rem;
            opacity: 0.85;
        }

        #start-btn {
            font-size: 1.5rem;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        #play-area {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .emoji-display {
            position: absolute;
            font-size: 8rem;
            pointer-events: none;
            animation: pop-in 0.3s ease-out;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            z-index: 10;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .emoji-display.fading {
            transition: opacity 0.5s ease-out;
            opacity: 0;
        }

        /* Mobile touch grid */
        #touch-grid {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 100;
        }

        .touch-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #touch-grid.grid-large .touch-btn {
            font-size: 3.5rem;
            border-radius: 12px;
        }

        #touch-grid.grid-large .color-swatch {
            width: 50%;
        }

        .touch-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }

        .touch-btn.playing {
            animation: pulse 0.3s ease-out;
        }

        .touch-btn .emoji {
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }

        .touch-btn.fading .emoji {
            opacity: 0;
            transform: scale(1.5);
        }

        .touch-btn.charging {
            animation: charge 0.15s ease-out forwards;
        }

        .touch-btn.charging .emoji {
            animation: emoji-charge 0.15s ease-out forwards;
        }

        @keyframes charge {
            0% {
                background: rgba(255,255,255,0.1);
            }
            100% {
                background: rgba(255,255,255,0.35);
            }
        }

        @keyframes emoji-charge {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            100% {
                transform: scale(1.15);
                filter: brightness(1.3);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            #start-screen h1 {
                font-size: 2rem;
            }
            .game-card {
                margin: 0.8rem 1rem;
            }
            #mode-selector {
                max-width: 280px;
            }
            .mode-btn .mode-icon {
                font-size: 1.8rem;
            }
            .mode-btn .mode-label {
                font-size: 0.85rem;
            }
            .touch-btn {
                font-size: 5rem;
            }
        }

        /* Mode selector */
        #mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 1.5rem auto;
            max-width: 340px;
        }

        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 0.5rem;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-btn .mode-icon {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .mode-btn .mode-label {
            font-size: 1rem;
            font-weight: 600;
        }

        .mode-btn.selected {
            border-color: #ffd93d;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,217,61,0.3);
        }

        .mode-btn:active {
            transform: scale(0.95);
        }

        /* Difficulty slider */
        #difficulty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem auto;
            color: white;
            font-size: 1.1rem;
        }

        #difficulty-control label {
            font-weight: 600;
        }

        #difficulty-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
            outline: none;
        }

        #difficulty-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ffd93d;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        #difficulty-label {
            min-width: 60px;
            font-weight: 600;
        }

        #quiz-btn {
            font-size: 1.5rem;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            background: #ff6b9d;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #quiz-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #quiz-btn:active {
            transform: scale(0.98);
        }

        #quiz-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            flex-direction: column;
        }

        #quiz-prompt {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 15vh;
            min-height: 60px;
        }

        #quiz-speaker {
            font-size: 4rem;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #quiz-speaker:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.3);
        }

        #quiz-speaker.speaking {
            animation: speaker-pulse 0.6s ease-in-out infinite;
        }

        @keyframes speaker-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #quiz-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            flex: 1;
        }

        .quiz-btn {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .quiz-btn:active {
            transform: scale(0.95);
        }

        .quiz-btn.correct {
            animation: correct-flash 0.5s ease-out;
            background: rgba(0, 255, 100, 0.4);
        }

        @keyframes correct-flash {
            0% { background: rgba(0, 255, 100, 0.1); transform: scale(1); }
            50% { background: rgba(0, 255, 100, 0.5); transform: scale(1.08); }
            100% { background: rgba(0, 255, 100, 0.4); transform: scale(1); }
        }

        .quiz-btn.fade-in .emoji {
            animation: quiz-fade-in 0.4s ease-out;
        }

        @keyframes quiz-fade-in {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Text choices (letters, numbers) */
        .text-choice {
            color: white;
            font-weight: 700;
        }

        /* Color swatches */
        .color-swatch {
            width: 60%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            animation: quiz-fade-in 0.4s ease-out;
        }

        /* Star bar */
        #star-bar {
            display: flex;
            gap: 6px;
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        .star-slot {
            font-size: 1.8rem;
            opacity: 0.25;
            transition: opacity 0.3s, transform 0.3s;
        }

        .star-slot.earned {
            opacity: 1;
            animation: star-pop 0.4s ease-out;
        }

        @keyframes star-pop {
            0% { transform: scale(0.3) rotate(-30deg); }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Finale overlay */
        #finale-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2000;
            pointer-events: none;
        }

        #finale-overlay.active {
            display: block;
        }

        .finale-star {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
        }

        .finale-star.roaming {
            animation: star-roam linear infinite;
        }

        @keyframes star-roam {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(30vw, -20vh) rotate(180deg) scale(1.2); }
            50% { transform: translate(-10vw, 15vh) rotate(360deg) scale(0.9); }
            75% { transform: translate(20vw, 10vh) rotate(540deg) scale(1.1); }
            100% { transform: translate(0, 0) rotate(720deg) scale(1); }
        }

        .finale-star.grow {
            animation: star-grow 1.5s ease-in-out forwards;
        }

        @keyframes star-grow {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -50%) scale(6) rotate(180deg); }
            100% { transform: translate(-50%, -50%) scale(8) rotate(360deg); opacity: 0; }
        }

        /* Wrong answer X */
        .wrong-x {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 5rem;
            color: rgba(255, 80, 80, 0.7);
            pointer-events: none;
            animation: wrong-fade 0.6s ease-out forwards;
        }

        @keyframes wrong-fade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Confetti */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            #quiz-speaker {
                font-size: 3rem;
                width: 64px;
                height: 64px;
            }
            .quiz-btn {
                font-size: 5rem;
            }
        }

        /* Player control */
        #player-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin: 1rem auto 0;
            color: white;
            font-size: 1.1rem;
        }

        #player-control label {
            font-weight: 600;
        }

        .player-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .player-btn.selected {
            border-color: #6bcb77;
            background: rgba(107,203,119,0.25);
        }

        /* Memory button */
        #memory-btn {
            font-size: 1.5rem;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            background: #6bcb77;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.8rem;
        }

        #memory-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #memory-btn:active {
            transform: scale(0.98);
        }

        /* Memory screen */
        #memory-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            flex-direction: column;
        }

        #memory-header {
            padding: 0.5rem;
        }

        #memory-scores {
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: white;
            font-size: 1.3rem;
        }

        .memory-player {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            opacity: 0.4;
            transition: opacity 0.3s, background 0.3s;
        }

        .memory-player.active {
            opacity: 1;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 10px rgba(255,217,61,0.3);
        }

        .player-score {
            font-weight: 700;
        }

        /* Memory grid */
        #memory-grid {
            display: grid;
            gap: 6px;
            padding: 8px;
            flex: 1;
            overflow: hidden;
        }

        /* Card flip */
        .memory-card {
            perspective: 600px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            min-height: 0;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .memory-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .card-front {
            background: rgba(255,255,255,0.15);
            font-size: 1.8rem;
            color: rgba(255,255,255,0.3);
        }

        .card-back {
            background: rgba(255,255,255,0.1);
            transform: rotateY(180deg);
            font-size: 2.5rem;
        }

        .memory-card.matched .card-inner {
            box-shadow: 0 0 12px rgba(0,255,100,0.3);
        }

        .memory-card.matched {
            pointer-events: none;
        }

        #memory-grid.grid-small .card-back {
            font-size: 1.6rem;
        }

        #memory-grid.grid-small .card-front {
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            #memory-btn {
                font-size: 1.3rem;
                padding: 0.7rem 1.8rem;
            }
        }

        #instruction-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
            pointer-events: none;
        }

        /* === Uno config on start screen === */
        .uno-config-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 0.5rem auto 0;
            color: white;
            font-size: 1rem;
        }
        .uno-config-group label { font-weight: 600; min-width: 60px; text-align: right; }
        .uno-config-btn {
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .uno-config-btn.selected {
            border-color: #ffd93d;
            background: rgba(255,217,61,0.2);
        }
        #uno-btn {
            font-size: 1.5rem;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            background: #f59e0b;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.8rem;
        }
        #uno-btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        #uno-btn:active { transform: scale(0.98); }

        /* === Uno game screen === */
        #uno-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            flex-direction: column;
            overflow: hidden;
        }

        /* AI area */
        #uno-ai-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 8px 8px 0;
            min-height: 60px;
        }
        .uno-ai-player {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .uno-ai-player.active {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 12px rgba(255,217,61,0.3);
        }
        .uno-ai-name {
            color: rgba(255,255,255,0.8);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .uno-ai-count {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
        .uno-ai-cards {
            display: flex;
            gap: 2px;
        }
        .uno-ai-more {
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            align-self: center;
        }

        /* Center area */
        #uno-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            position: relative;
        }
        #uno-draw-pile, #uno-discard-area {
            position: relative;
        }
        .uno-pile-card {
            width: 80px !important;
            height: 120px !important;
            font-size: 1.4rem !important;
        }
        .uno-pile-card .uno-card-tl, .uno-pile-card .uno-card-br {
            font-size: 0.7rem !important;
        }
        .uno-pile-count {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
        }
        #uno-color-indicator {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
        }
        .uno-color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            transition: background 0.3s;
        }
        #uno-direction {
            position: absolute;
            top: 50%;
            right: -50px;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 2rem;
        }
        .uno-back.drawable {
            cursor: pointer;
            animation: uno-pulse 1s ease-in-out infinite;
        }
        @keyframes uno-pulse {
            0%, 100% { box-shadow: 0 0 0 rgba(255,217,61,0); }
            50% { box-shadow: 0 0 20px rgba(255,217,61,0.5); }
        }

        /* Status bar */
        #uno-status {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            padding: 6px;
            min-height: 30px;
        }

        /* Hand area */
        #uno-hand-wrapper {
            padding: 6px 0 12px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            min-height: 120px;
            transition: background 0.4s, box-shadow 0.4s;
        }
        #uno-hand-wrapper.my-turn {
            background: linear-gradient(0deg, rgba(255,217,61,0.15) 0%, rgba(255,217,61,0.03) 70%, transparent 100%);
            box-shadow: 0 -4px 20px rgba(255,217,61,0.12);
        }
        #uno-hand {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 0 12px;
            min-width: min-content;
        }

        /* === Card styles === */
        .uno-card {
            width: 60px;
            height: 90px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            position: relative;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .uno-card.red { background: #e53e3e; }
        .uno-card.yellow { background: #ecc94b; color: #333; }
        .uno-card.green { background: #38a169; }
        .uno-card.blue { background: #3182ce; }
        .uno-card.wild {
            background: linear-gradient(135deg, #e53e3e 25%, #ecc94b 25%, #ecc94b 50%, #38a169 50%, #38a169 75%, #3182ce 75%);
        }
        .uno-card.uno-back {
            background: #2d3748;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .uno-card.uno-empty {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.1);
        }
        .uno-card-val {
            font-size: 1.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .uno-card.emoji-val .uno-card-val { font-size: 2rem; }
        .uno-card-tl, .uno-card-br {
            position: absolute;
            font-size: 0.6rem;
            pointer-events: none;
        }
        .uno-card-tl { top: 4px; left: 5px; }
        .uno-card-br { bottom: 4px; right: 5px; transform: rotate(180deg); }
        .uno-card.emoji-val .uno-card-tl,
        .uno-card.emoji-val .uno-card-br { font-size: 0.7rem; }

        /* Mini cards (AI area) */
        .uno-card.uno-mini {
            width: 24px;
            height: 36px;
            border-radius: 4px;
            font-size: 0.5rem;
        }
        .uno-card.uno-mini .uno-card-val { font-size: 0.6rem; }
        .uno-card.uno-mini .uno-card-tl,
        .uno-card.uno-mini .uno-card-br { display: none; }

        /* Hand card states */
        .uno-hand-card { cursor: pointer; }
        .uno-hand-card.playable {
            transform: translateY(-8px);
            box-shadow: 0 4px 16px rgba(255,217,61,0.4);
            cursor: pointer;
        }
        .uno-hand-card.playable:active { transform: translateY(-4px) scale(0.96); }
        .uno-hand-card.dimmed { opacity: 0.45; cursor: default; }

        /* Flying card (animation) */
        .uno-card.uno-flying {
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Flash message */
        .uno-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 2.5rem;
            font-weight: 800;
            pointer-events: none;
            z-index: 4000;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            animation: uno-flash-anim 1.2s ease-out forwards;
        }
        @keyframes uno-flash-anim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -60%) scale(1); opacity: 0; }
        }

        /* Color picker overlay */
        #uno-color-picker {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .uno-cpick-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.4);
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .uno-cpick-btn:hover { transform: scale(1.1); border-color: white; }
        .uno-cpick-btn:active { transform: scale(0.95); }

        /* Uno button */
        #uno-uno-btn {
            display: none;
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #f59e0b;
            cursor: pointer;
            z-index: 3000;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 24px rgba(245,158,11,0.5);
            animation: uno-btn-pulse 0.6s ease-in-out infinite;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes uno-btn-pulse {
            0%, 100% { box-shadow: 0 0 16px rgba(245,158,11,0.3); }
            50% { box-shadow: 0 0 32px rgba(245,158,11,0.7); }
        }
        .uno-timer-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .uno-timer-bg {
            fill: none;
            stroke: rgba(255,255,255,0.15);
            stroke-width: 3;
        }
        .uno-timer-ring {
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-dasharray: 188;
            stroke-dashoffset: 0;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.05s linear;
        }
        .uno-timer-text {
            font-size: 1rem;
            font-weight: 800;
            color: white;
            z-index: 1;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        /* Game over overlay */
        #uno-game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            z-index: 3500;
            justify-content: center;
            align-items: center;
        }
        .uno-go-content {
            text-align: center;
            color: white;
        }
        .uno-go-content h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .uno-go-btn {
            font-size: 1.3rem;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 30px;
            background: #f59e0b;
            color: white;
            cursor: pointer;
            margin: 0.5rem;
            transition: transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .uno-go-btn:active { transform: scale(0.95); }
        .uno-go-btn.uno-go-menu { background: rgba(255,255,255,0.2); }

        @media (max-width: 768px) {
            .uno-card { width: 52px; height: 78px; }
            .uno-card-val { font-size: 1.5rem !important; }
            .uno-card.emoji-val .uno-card-val { font-size: 1.6rem !important; }
            .uno-pile-card { width: 70px !important; height: 105px !important; }
            #uno-hand-wrapper { min-height: 100px; }
            #uno-direction { right: -35px; font-size: 1.5rem; }
            .uno-cpick-btn { width: 64px; height: 64px; }
            #uno-uno-btn { bottom: 115px; width: 70px; height: 70px; }
            #uno-btn { font-size: 1.3rem; padding: 0.7rem 1.8rem; }
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>Fun Sounds!</h1>
        <p>Pick a game!</p>

        <div class="game-card">
            <h2>Free Play / Quiz</h2>
            <div id="mode-selector">
                <button class="mode-btn selected" data-mode="objects">
                    <span class="mode-icon">🐶</span>
                    <span class="mode-label">Objects</span>
                </button>
                <button class="mode-btn" data-mode="alphabet">
                    <span class="mode-icon">🔤</span>
                    <span class="mode-label">Letters</span>
                </button>
                <button class="mode-btn" data-mode="colors">
                    <span class="mode-icon">🌈</span>
                    <span class="mode-label">Colors</span>
                </button>
                <button class="mode-btn" data-mode="numbers">
                    <span class="mode-icon">🔢</span>
                    <span class="mode-label">Numbers</span>
                </button>
            </div>
            <div id="difficulty-control">
                <label for="difficulty-slider">Difficulty</label>
                <input type="range" id="difficulty-slider" min="1" max="3" value="2" step="1">
                <span id="difficulty-label">Normal</span>
            </div>
            <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
                <button id="start-btn">Free Play</button>
                <button id="quiz-btn">Start Quiz</button>
            </div>
        </div>

        <div class="game-card">
            <h2>Memory Game</h2>
            <div id="player-control">
                <label>Players</label>
                <button class="player-btn selected" data-players="1">1</button>
                <button class="player-btn" data-players="2">2</button>
            </div>
            <button id="memory-btn">Memory Game</button>
        </div>

        <div class="game-card">
            <h2>Uno</h2>
            <div class="uno-config-group">
                <label>AI</label>
                <button class="uno-config-btn selected" data-ai-count="1">1</button>
                <button class="uno-config-btn" data-ai-count="2">2</button>
                <button class="uno-config-btn" data-ai-count="3">3</button>
            </div>
            <div class="uno-config-group">
                <label>Theme</label>
                <button class="uno-config-btn selected" data-uno-theme="classic">Classic</button>
                <button class="uno-config-btn" data-uno-theme="emoji">Emoji</button>
            </div>
            <div class="uno-config-group">
                <label>Rules</label>
                <button class="uno-config-btn selected" data-uno-rules="beginner">Beginner</button>
                <button class="uno-config-btn" data-uno-rules="intermediate">Intermediate</button>
            </div>
            <button id="uno-btn">Uno!</button>
        </div>
    </div>

    <div id="play-area">
        <div id="instruction-hint">Hold Escape to exit</div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-prompt">
            <div id="star-bar"></div>
            <button id="quiz-speaker">🔊</button>
        </div>
        <div id="quiz-grid"></div>
        <div id="confetti-container"></div>
        <div id="finale-overlay"></div>
    </div>

    <div id="memory-screen">
        <div id="memory-header">
            <div id="memory-scores">
                <span class="memory-player active" id="memory-p1">
                    <span class="player-name">P1</span>
                    <span class="player-score">0</span>
                </span>
                <span class="memory-player" id="memory-p2">
                    <span class="player-name">P2</span>
                    <span class="player-score">0</span>
                </span>
            </div>
        </div>
        <div id="memory-grid"></div>
    </div>

    <div id="uno-screen">
        <div id="uno-ai-area"></div>
        <div id="uno-center">
            <div id="uno-draw-pile"></div>
            <div id="uno-discard-area"></div>
            <div id="uno-color-indicator"></div>
            <div id="uno-direction"></div>
        </div>
        <div id="uno-status"></div>
        <div id="uno-hand-wrapper">
            <div id="uno-hand"></div>
        </div>
        <button id="uno-uno-btn"></button>
        <div id="uno-color-picker"></div>
        <div id="uno-game-over"></div>
    </div>

    <div id="touch-grid"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
