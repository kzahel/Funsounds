<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhysX batch-readback benchmark</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #101418; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #bench-canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; left: 12px; top: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.45;
      background: rgba(0,0,0,0.55);
      padding: 8px 12px;
      border-radius: 6px;
      pointer-events: none;
      min-width: 280px;
      white-space: pre;
    }
    #banner {
      position: fixed; right: 12px; top: 12px;
      font-family: inherit; font-size: 12px; color: #fff;
      background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 6px;
    }
    #error-overlay {
      display: none; position: fixed; inset: 0; align-items: center; justify-content: center;
      background: rgba(20,0,0,0.9); color: #fff; font-family: monospace; padding: 20px; text-align: center; z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="bench-canvas"></canvas>
  <div id="hud">booting…</div>
  <div id="banner"></div>
  <div id="error-overlay"></div>
  <script type="module" src="/src/physics-bench/index.ts"></script>
</body>
</html>
