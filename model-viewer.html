<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniGen Model Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #15151d; color: #fff; }
    #viewer-canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: rgba(0,0,0,0.55); padding: 10px 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.5;
      display: flex; flex-direction: column; gap: 6px;
    }
    #hud select, #hud button {
      font: inherit; color: #fff; background: #23232e; border: 1px solid #3a3a48;
      padding: 4px 8px; border-radius: 4px; cursor: pointer;
    }
    #hud label { display: flex; gap: 6px; align-items: center; }
    #info { font-family: monospace; font-size: 11px; opacity: 0.75; white-space: pre; }
    #back {
      position: fixed; right: 12px; top: 12px; z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; color: #fff; background: rgba(0,0,0,0.45);
      padding: 6px 12px; border-radius: 8px; text-decoration: none;
    }
  </style>
</head>
<body>
  <canvas id="viewer-canvas"></canvas>
  <div id="hud">
    <label>Model:
      <select id="model-select">
        <option value="iron_boy">iron_boy</option>
        <option value="owl">owl</option>
        <option value="trex">trex</option>
      </select>
    </label>
    <label><input type="checkbox" id="toggle-skeleton" checked /> Skeleton helper</label>
    <label><input type="checkbox" id="toggle-bbox" /> Bounding box</label>
    <label><input type="checkbox" id="toggle-axes" /> World axes</label>
    <label><input type="checkbox" id="toggle-wire" /> Wireframe</label>
    <div id="info"></div>
  </div>
  <a id="back" href="./">← Back</a>
  <script type="module" src="/src/model-viewer/index.ts"></script>
</body>
</html>
